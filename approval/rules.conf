# === Tier 1: Hard-block rules ===
# These are checked first. Any match → instant deny.
# block: rules use \b word boundaries to avoid false positives (e.g., "eval" won't match "evaluate").
# block-pattern: rules use full regex. Patterns are NOT anchored by default — add ^ explicitly
# for start-of-string matching. Unanchored patterns match anywhere in compound commands.

# Word-boundary blocks
block:\bsudo\b
block:\beval\b
# exec: anchored to command position (including subshells) to avoid blocking "npm exec"
block-pattern:(^\s*|[;&|({$\n]\s*)exec\b
# source: anchored to command position (including subshells) to avoid blocking "--source" flags
block-pattern:(^\s*|[;&|({$\n]\s*)source\b
block:\bprintenv\b
block:\bxargs\b
block:\bapprove\b

# Pipe to any shell/interpreter
block-pattern:.*\|\s*/?(usr/)?(s?bin/)?(ba)?sh\b
block-pattern:.*\|\s*/?(usr/)?(s?bin/)?(python3?|node|bun|perl|ruby)\b

# Shell execution wrappers
block-pattern:^(ba)?sh\s+-c\b

# Destructive system operations
block-pattern:^rm\s+-rf\s+/
block-pattern:^chmod\s+777\b

# Dangerous gh subcommands (data exfiltration vectors)
block-pattern:^gh\s+gist\b
block-pattern:^gh\s+repo\s+(create|delete)\b
block-pattern:^gh\s+auth\b

# Dangerous bun subcommands
block-pattern:^bun\s+(publish|upgrade|feedback)\b

# tmux cross-pane injection
block-pattern:^tmux\s+(send-keys|send-prefix|capture-pane|pipe-pane)\b

# Prevent reading environment variables and /proc (credential leaks)
block:\benv\b
block-pattern:.*/proc/

# Prevent command execution via find -exec and related flags
block-pattern:.*-(exec|execdir|ok|okdir)\b

# Git safety: prevent destructive push and remote manipulation
# Push rules use compound-command-aware anchoring (same as fly rules)
# to prevent bypass via "cd /repo && git push --force origin main"
block-pattern:(^\s*|[;&|({$]\s*)git\s+push\s+.*--force
block-pattern:(^\s*|[;&|({$]\s*)git\s+push\s+.*-[a-zA-Z]*f
block-pattern:(^\s*|[;&|({$]\s*)git\s+push\s+.*--delete
block-pattern:(^\s*|[;&|({$]\s*)git\s+push\s+.*-[a-zA-Z]*d
block-pattern:(^\s*|[;&|({$]\s*)git\s+push\s+.*\b(main|master)\b
block-pattern:(^\s*|[;&|({$]\s*)git\s+remote\s+(add|set-url|rename|remove)\b
block-pattern:(^\s*|[;&|({$]\s*)git\s+config\s+.*remote\.
block-pattern:(^\s*|[;&|({$]\s*)git\s+tag\b
block-pattern:(^\s*|[;&|({$]\s*)git\s+push\s+.*--tags

# Fly.io credential management (user handles interactively via ! shell escape)
block-pattern:(^\s*|[;&|({$]\s*)fly\s+auth\b
block-pattern:(^\s*|[;&|({$]\s*)fly\s+tokens?\b

# Fly.io lateral movement (SSH/proxy/sftp/console to other machines)
block-pattern:(^\s*|[;&|({$]\s*)fly\s+ssh\b
block-pattern:(^\s*|[;&|({$]\s*)fly\s+proxy\b
block-pattern:(^\s*|[;&|({$]\s*)fly\s+sftp\b
block-pattern:(^\s*|[;&|({$]\s*)fly\s+console\b

# Credential leak prevention: block direct references to secret env vars
block-pattern:\$\{?(CLAUDE_CODE_OAUTH_TOKEN|GH_PAT|FLY_ACCESS_TOKEN|FLY_API_TOKEN)\b

# === Tier 2: Hot words ===
# Presence anywhere in the command triggers Haiku classification.
# If no hot word matches, the command is allowed (default-allow posture).

# Package managers
hot:bun add
hot:bun install
hot:bun create
hot:bun update
hot:bun x
hot:bunx
hot:apt-get
hot:apt install
hot:pip install
hot:pip3 install
hot:pipx
hot:npm install
hot:npm ci
hot:npm exec
hot:npx

# Network tools
hot:curl
hot:wget

# Credential variable names (escalate any indirect reference)
hot:CLAUDE_CODE_OAUTH_TOKEN
hot:GH_PAT

# Fly.io mutating commands (read-only commands like fly status/logs are default-allow)
hot:fly deploy
hot:fly launch
hot:fly machine
hot:fly scale
hot:fly secrets
hot:fly volumes
hot:fly apps
hot:fly ips
hot:fly certs
hot:fly config
hot:fly image
hot:fly postgres
hot:fly mysql
hot:fly redis
hot:fly extensions
hot:fly wireguard

# Fly.io credential variables and config directory
hot:FLY_ACCESS_TOKEN
hot:FLY_API_TOKEN
hot:.fly/

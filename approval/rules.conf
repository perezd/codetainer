# Auto-approve patterns (exit 0)
allow:^git\s+(status|log|diff|branch|checkout|switch|add|commit|stash|rebase|merge|fetch|show|rev-parse|symbolic-ref|config|init|reset|restore|cherry-pick|tag|bisect|blame|shortlog|describe|ls-files|ls-tree|rev-list|for-each-ref|name-rev|reflog)\b
allow:^git\s+clone\b
allow:^git\s+push\b
allow:^git\s+remote\s*$
allow:^git\s+remote\s+(-v|--verbose|show|get-url)\b
allow:^(ls|cat|head|tail|cp|mv|mkdir|touch|tree|less)\b
allow:^(grep|rg|fd|ag)\b
allow:^bun\s+(run|test|build|check|remove|link|unlink|patch|pm|why|init|repl|exec|audit|outdated|info)\b
allow:^(bunx|bun\s+x)\s+prettier\b
allow:^just\b
allow:^(python3?)\b
allow:^(echo|pwd|cd|which)\b
allow:^(wc|sort|uniq|diff|sed|awk|tee|basename|dirname)\b
allow:^(date|file|stat|realpath|readlink|id|whoami|uname|hostname)\b
allow:^(tar|gzip|gunzip|zip|unzip)\b
allow:^(tr|cut|paste|comm|join)\b
allow:^gh\s+(pr|issue|repo view|repo clone|run view|run list|api)\b
allow:^(rm|rmdir)\b
allow:^(mv|cp|ln)\b
allow:^(chmod|chown)\b
allow:^tmux\s+(list-sessions|list-windows|display-message)\b
allow:^node\b
allow:^npm\s+(ls|list|view|info|explain|query)\b

# Hard-block patterns (exit 2, cannot be approved)
# Pipe to any shell/interpreter
block:.*\|\s*/?(usr/)?(s?bin/)?(ba)?sh\b
block:.*\|\s*/?(usr/)?(s?bin/)?(python3?|node|bun|perl|ruby)\b
# Shell execution wrappers
block:^(ba)?sh\s+-c\b
block:^eval\b
block:^exec\b
block:^source\b
# Destructive system operations
block:^sudo\b
block:^rm\s+-rf\s+/
block:^chmod\s+777\b
# Self-approval prevention
block:^approve\b
# Dangerous gh subcommands (data exfiltration vectors)
block:^gh\s+gist\b
block:^gh\s+repo\s+(create|delete)\b
block:^gh\s+auth\b
# Dangerous bun subcommands
block:^bun\s+(publish|upgrade|feedback)\b
# tmux cross-pane injection
block:^tmux\s+(send-keys|send-prefix|capture-pane|pipe-pane)\b
# Prevent reading environment variables and /proc (credential leaks)
block:^(printenv|env$)
block:.*/proc/
# Prevent command execution via find/xargs arguments
block:.*-exec\b
block:.*\bxargs\b
# Git safety: prevent destructive push and remote manipulation
block:^git\s+push\s+.*--force
block:^git\s+push\s+.*-[a-zA-Z]*f
block:^git\s+push\s+.*--delete
block:^git\s+push\s+.*-[a-zA-Z]*d
block:^git\s+push\s+.*\b(main|master)\b
block:^git\s+remote\s+(add|set-url|rename|remove)\b
block:^git\s+config\s+.*remote\.
block:^git\s+tag\b
block:^git\s+push\s+.*--tags

# Approval-required patterns (exit 2 with approval instructions)
approve:^(apt-get|apt)\s+install\b
approve:^bun\s+(add|install|x|update|create)\b
approve:^bunx\b
approve:^(pip3?|pipx)\s+install\b
approve:^curl\b
approve:^wget\b
approve:^npm\s+(install|ci|exec|run)\b
approve:^npx\b

# Default: block unmatched commands (allowlist model)
# Use "allow" to switch to a denylist model if this is too restrictive
default:block
